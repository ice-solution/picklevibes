<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="zh-HK">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>{{HEADLINE}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#fdf2f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <!-- Preheader（部分客戶端會顯示為摘要） -->
  <div style="display:none;font-size:1px;color:#fdf2f8;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    {{PREHEADER}}
  </div>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#fdf2f8;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="width:100%;max-width:600px;background-color:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,0.08);">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#ec4899 0%,#14b8a6 100%);padding:28px 32px;text-align:center;">
              <p style="margin:0;font-size:22px;font-weight:800;color:#ffffff;letter-spacing:-0.02em;">PickleVibes</p>
              <p style="margin:8px 0 0;font-size:13px;color:rgba(255,255,255,0.92);">匹克球 · 預約與會員服務</p>
            </td>
          </tr>
          <!-- Title -->
          <tr>
            <td style="padding:28px 32px 8px;">
              <h1 style="margin:0;font-size:22px;line-height:1.35;color:#0f172a;font-weight:700;">{{HEADLINE}}</h1>
            </td>
          </tr>
          <!-- Body (HTML 由後台／管理員提供) -->
          <tr>
            <td style="padding:12px 32px 24px;font-size:16px;line-height:1.65;color:#334155;">
              {{BODY_HTML}}
            </td>
          </tr>
          <!-- CTA -->
          <tr>
            <td style="padding:0 32px 28px;">
              {{CTA_SECTION}}
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td style="padding:20px 32px;background-color:#fdf2f8;border-top:1px solid #fbcfe8;">
              <p style="margin:0 0 8px;font-size:12px;line-height:1.5;color:#64748b;">{{FOOTER_NOTE}}</p>
              <p style="margin:0;font-size:12px;color:#94a3b8;">
                <a href="{{SITE_URL}}" style="color:#db2777;text-decoration:none;font-weight:600;">{{SITE_URL_TEXT}}</a>
                &nbsp;·&nbsp;© {{YEAR}} PickleVibes
              </p>
            </td>
          </tr>
        </table>
        <p style="margin:16px 0 0;font-size:11px;color:#94a3b8;text-align:center;max-width:560px;">
          此郵件由系統發出，請勿直接回覆。如需協助請透過網站聯絡我們。
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
